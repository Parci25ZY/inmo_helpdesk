<aside
    id="chatbot-aside"
    class="tickets-workspace__aside"
    aria-label="Asistente IA de mantenimiento"
>
    <div
        id="chatbot-panel"
        class="chatbot-shell"
        data-session-url="{% url 'ai_agent:chat_session' %}"
        data-send-url="{% url 'ai_agent:chat_send' %}"
        data-ticket-create-url="{% url 'ticket_create' %}"
    >
        <header class="chatbot-shell__head">
            <div class="chatbot-shell__brand">
                <div class="chatbot-shell__icon">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.847-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.847.813a4.5 4.5 0 00-3.09 3.09z"/>
                    </svg>
                </div>
                <div class="min-w-0">
                    <p class="chatbot-shell__title">Asistente IA</p>
                    <p class="chatbot-shell__sub">Soporte inmediato</p>
                </div>
            </div>
            <div class="chatbot-shell__actions">
                <span id="chatbot-status-dot" class="chatbot-status">
                    <span class="chatbot-status__dot"></span> Online
                </span>
                <button type="button" id="chatbot-drawer-close" class="chatbot-btn-icon chatbot-close-mobile" aria-label="Cerrar asistente">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </header>

        <div class="chatbot-panel">
            {% include 'partials/_chatbot_panel_inner.html' %}
        </div>
    </div>
</aside>

<div id="chatbot-backdrop" class="chatbot-backdrop" aria-hidden="true"></div>

<button type="button" id="chatbot-fab" class="chatbot-fab" aria-label="Abrir asistente" aria-expanded="false">
    <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/></svg>
    <span>Asistente</span>
</button>
