{% comment %}
  Badge de prioridad. Args: prioridad (string), display (string)
{% endcomment %}
<span class="inline-flex items-center gap-1.5 text-xs font-semibold whitespace-nowrap
    {% if prioridad == 'ALTA' %}text-orange-700
    {% elif prioridad == 'MEDIA' %}text-zinc-700
    {% else %}text-zinc-500{% endif %}">
    {% if prioridad == 'ALTA' %}
        <span class="w-1.5 h-1.5 rounded-full bg-orange-500"></span>
    {% elif prioridad == 'MEDIA' %}
        <span class="w-1.5 h-1.5 rounded-full bg-zinc-400"></span>
    {% else %}
        <span class="w-1.5 h-1.5 rounded-full bg-zinc-300"></span>
    {% endif %}
    {{ display }}
</span>
