version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: inmo_db
    environment:
      - POSTGRES_DB=inmo_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mundo123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: inmo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
